# ============================================================
# Foundry — Docker Compose
#
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f app
#   Logs:    docker compose logs -f worker
#   Migrate: DATABASE_URL=... npx prisma migrate deploy  (from host)
#
# For production on the Hetzner VPS, override values via:
#   docker compose -f compose.yml -f compose.prod.yml up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # Application — Next.js standalone server
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foundry_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-foundry}:${POSTGRES_PASSWORD:-foundry_secret}@db:5432/${POSTGRES_DB:-foundry}?schema=public"
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    # Task 3.2.1 — Explicit json-file driver.
    # Promtail's docker_sd_configs reads /var/lib/docker/containers/<id>/*-json.log
    # Docker defaults to json-file anyway, but this makes it explicit and adds
    # rotation so logs don't exhaust disk on long-running VPS deployments.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Rotate after 10MB
        max-file: "5"     # Keep last 5 rotated file
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foundry_net

  # ----------------------------------------------------------
  # Worker — BullMQ background job processor
  # ----------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: foundry_worker
    restart: unless-stopped
    environment:
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    # Same json-file logging as the app — Promtail picks this up automatically.
    # Container name foundry_worker → Loki label {app="foundry_worker"}.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - foundry_net

  # ----------------------------------------------------------
  # Database — PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: foundry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-foundry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foundry} -d ${POSTGRES_DB:-foundry}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foundry_net
    # Do NOT expose port 6379 to host in production.
    # For local development, uncomment:
    ports:
      - "5432:5432"

  # ----------------------------------------------------------
  # Redis 7 — Job queue broker for BullMQ
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: foundry_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - foundry_net
    # Redis not exposed to host. For local dev, uncomment:
    # ports:
    #   - "6379:6379"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  foundry_net:
    driver: bridge
