# ============================================================
# Foundry — Docker Compose
#
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f app
#   Migrate: docker compose exec app npx prisma migrate deploy
#
# For production on the Hetzner VPS, override values via:
#   docker compose -f compose.yml -f compose.prod.yml up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # Application — Next.js standalone server
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foundry_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Inside Docker, the DB is reachable via the service name "db", not "localhost"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-foundry}:${POSTGRES_PASSWORD:-foundry_secret}@db:5432/${POSTGRES_DB:-foundry}?schema=public"
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - foundry_net

  # ----------------------------------------------------------
  # Database — PostgreSQL 16
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: foundry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-foundry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foundry} -d ${POSTGRES_DB:-foundry}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foundry_net
    # Do NOT expose port 5432 to host in production.
    # For local development, uncomment:
    ports:
      - "5432:5432"

volumes:
  postgres_data:
    driver: local

networks:
  foundry_net:
    driver: bridge
